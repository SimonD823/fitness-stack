version: "3.8"
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OPENAI_API_BASE_URL: "http://${MAX_HOST}:1234/v1"
      OPENAI_API_KEY: "dummy"
      WEBUI_AUTH: "false"
    volumes:
      - /share/Container/open-webui/data:/app/backend/data
    ports:
      - "3001:8080"
