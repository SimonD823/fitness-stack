version: "3.8"
services:
  cronometer-sync:
    image: python:3.12-slim
    container_name: cronometer-sync
    restart: unless-stopped
    environment:
      INFLUX_HOST: "${NAS_HOST}"
      INFLUX_PORT: "${INFLUX_PORT}"
      INFLUX_USER: "${INFLUX_USER}"
      INFLUX_PASS: "${INFLUX_PASS}"
      CRONOMETER_USER: "${CRONOMETER_USER}"
      CRONOMETER_PASS: "${CRONOMETER_PASS}"
      SYNC_HOUR: "6"
      SYNC_MINUTE: "0"
    volumes:
      - /share/Container/cronometer-sync/cronometer_sync.py:/app/cronometer_sync.py
    network_mode: host
    command: >
      bash -c "pip install --no-cache-dir requests influxdb --quiet &&
               python /app/cronometer_sync.py"
